name: Release Beta Platforms

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if version not newer'
        required: false
        type: boolean
        default: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            run_on: ubuntu-latest
            version_command: |
              set -e
              wget --no-verbose -O TermiusBeta.deb https://autoupdate.termius.com/linux/Termius%20Beta.deb || { echo "::error::Failed to download TermiusBeta.deb"; exit 1; }
              termius_version=$(dpkg -I TermiusBeta.deb | grep -i 'Version:' | awk '{print $2}')
              if [ -z "$termius_version" ]; then
                termius_version=$(ar p TermiusBeta.deb control.tar.gz | tar -xzO ./control | grep -i 'Version:' | awk '{print $2}')
              fi
              echo "TERMIUS_VERSION=$termius_version" >> $GITHUB_ENV
            install_command: |
              set -e
              sudo apt-get update
              sudo apt-get install -y libnotify4 libsecret-1-0 python3-tk
              sudo dpkg -i TermiusBeta.deb || { echo "::error::Failed to install Termius Beta"; exit 1; }
              sudo chmod -R 755 "/opt/Termius Beta/resources"
              sudo chown -R $USER:$USER "/opt/Termius Beta/resources"
            source_path: "/opt/Termius Beta/resources/app.asar"
          - platform: macos
            run_on: macos-latest
            version_command: |
              set -e
              echo "Downloading Termius Beta..."
              curl -L -o TermiusBeta.dmg https://autoupdate.termius.com/mac-beta-universal/Termius%20Beta.dmg || { echo "::error::Failed to download DMG"; exit 1; }
              temp_mount=$(mktemp -d)
              trap "hdiutil detach '$temp_mount' -quiet 2>/dev/null; rm -rf '$temp_mount'" EXIT
              hdiutil attach TermiusBeta.dmg -mountpoint "$temp_mount" -quiet -nobrowse || { echo "::error::Failed to mount DMG"; exit 1; }
              info_plist="$temp_mount/Termius Beta.app/Contents/Info.plist"
              [[ -f "$info_plist" ]] || { echo "::error::Info.plist not found"; exit 1; }
              termius_version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$info_plist") || { echo "::error::Failed to read version"; exit 1; }
              [[ -n "$termius_version" ]] || { echo "::error::Version is empty"; exit 1; }
              echo "TERMIUS_VERSION=$termius_version" >> $GITHUB_ENV
              echo "✓ Version: $termius_version"
            install_command: |
              set -e
              echo "Installing Termius Beta..."
              temp_mount=$(mktemp -d)
              trap "hdiutil detach '$temp_mount' -quiet 2>/dev/null; rm -rf '$temp_mount' TermiusBeta.dmg" EXIT
              hdiutil attach TermiusBeta.dmg -mountpoint "$temp_mount" -quiet -nobrowse || { echo "::error::Failed to mount DMG"; exit 1; }
              app_path=$(find "$temp_mount" -name "Termius Beta.app" -type d -maxdepth 3)
              [[ -n "$app_path" ]] || { echo "::error::Termius Beta.app not found"; exit 1; }
              cp -R "$app_path" /Applications/ || { echo "::error::Installation failed"; exit 1; }
              sudo chmod -R 755 "/Applications/Termius Beta.app/Contents/Resources"
              echo "✓ Installed successfully"
            source_path: "/Applications/Termius Beta.app/Contents/Resources/app.asar"
          - platform: windows
            run_on: windows-latest
            version_command: |
              $ErrorActionPreference = 'Stop'
              $beta_url = "https://autoupdate.termius.com/windows-beta/Install%20Termius%20Beta.exe"
              $installer_path = "$env:TEMP\TermiusBeta.exe"
              try {
                Write-Host "Downloading Termius Beta installer..."
                Invoke-WebRequest -Uri $beta_url -OutFile $installer_path -UseBasicParsing
                $termius_version = (Get-Item $installer_path).VersionInfo.ProductVersion
                if (-not $termius_version) {
                  throw "Failed to extract version from installer"
                }
                Add-Content -Path $env:GITHUB_ENV -Value "TERMIUS_VERSION=$termius_version"
                Write-Host "✓ Version: $termius_version"
              } catch {
                Write-Host "::error::$_"
                exit 1
              }
            install_command: |
              $ErrorActionPreference = 'Stop'
              $installer_path = "$env:TEMP\TermiusBeta.exe"
              $install_dir = "$env:LOCALAPPDATA\Programs\Termius Beta"
              try {
                Write-Host "Installing Termius Beta..."
                Start-Process -FilePath $installer_path -ArgumentList "/S" -Wait -NoNewWindow
                if (-not (Test-Path $install_dir)) {
                  throw "Installation failed, directory not found: $install_dir"
                }
                Write-Host "✓ Installed successfully"
              } catch {
                Write-Host "::error::$_"
                exit 1
              } finally {
                Remove-Item -Path $installer_path -Force -ErrorAction SilentlyContinue
              }
            source_path: "$LOCALAPPDATA/Programs/Termius Beta/resources/app.asar"
    uses: ./.github/workflows/shared-steps-beta.yml
    name: "Release Beta - ${{ matrix.platform }}"
    with:
      run_on: ${{ matrix.run_on }}
      platform: ${{ matrix.platform }}
      version_command: ${{ matrix.version_command }}
      install_command: ${{ matrix.install_command }}
      source_path: ${{ matrix.source_path }}
      force_release: ${{ github.event.inputs.force_release == 'true' }}