name: Shared Workflow Steps

on:
  workflow_call:
    inputs:
      run_on:
        description: "The running platform (ubuntu, macos, windows)"
        required: true
        type: string
      platform:
        description: "The target platform (linux, macos, windows)"
        required: true
        type: string
      version_command:
        description: "The command to extract the version from the downloaded package"
        required: true
        type: string
      install_command:
        description: "The command to install the Termius package"
        required: true
        type: string
      source_path:
        description: "The source path of the app.asar file"
        required: true
        type: string
      force_release:
        description: "Force release even if version not newer"
        required: false
        type: boolean
        default: false

jobs:
  template:
    runs-on: ${{ inputs.run_on }}
    timeout-minutes: 15
    steps:
      - name: Checkout source code from repository
        uses: actions/checkout@v5
      - name: Extract Termius package version
        id: extract_version
        run: |
          ${{ inputs.version_command }}
          echo "✓ Extracted version: $termius_version"
      - name: Validate extracted version
        id: validate_version
        shell: bash
        run: |
          set -e
          echo "Validating version: $TERMIUS_VERSION"
          if [ -z "$TERMIUS_VERSION" ]; then
            echo "::error::Version validation failed - no version extracted"
            exit 1
          fi
          echo "✓ Version validation passed: $TERMIUS_VERSION"
      - name: Fetch latest GitHub release version
        if: ${{ !inputs.force_release }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          release_url="https://api.github.com/repos/${{ github.repository }}/releases/latest"
          response=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$release_url")
          echo "::debug::GitHub API response: $(jq -c . <<< "$response")"
          github_version=$(echo "$response" | jq -r '.tag_name // "0.0.0"' | sed 's/^v//')
          echo "✓ Latest GitHub release: v$github_version"
          echo "GITHUB_VERSION=$github_version" >> $GITHUB_ENV
      - name: Compare version metadata
        id: compare_versions
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.force_release }}" = "true" ]; then
            echo "::notice::Force release enabled. Skipping version check."
            echo "should_continue=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Comparing versions: Termius=$TERMIUS_VERSION vs GitHub=$GITHUB_VERSION"
          if [ "$(printf '%s\n' "$TERMIUS_VERSION" "$GITHUB_VERSION" | sort -V | tail -n1)" == "$TERMIUS_VERSION" ] && [ "$TERMIUS_VERSION" != "$GITHUB_VERSION" ]; then
            echo "::notice::✓ Version check passed: Termius ($TERMIUS_VERSION) > GitHub ($GITHUB_VERSION)"
            echo "should_continue=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::✗ Version check failed: Termius ($TERMIUS_VERSION) <= GitHub ($GITHUB_VERSION)"
            echo "should_continue=false" >> $GITHUB_OUTPUT
          fi
      - name: Configure Python runtime environment
        if: steps.compare_versions.outputs.should_continue == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        if: steps.compare_versions.outputs.should_continue == 'true'
        run: |
          python -m pip install --upgrade pip
      - name: Install Termius application package
        if: steps.compare_versions.outputs.should_continue == 'true'
        run: |
          echo "Installing Termius v$TERMIUS_VERSION..."
          ${{ inputs.install_command }}
      - name: Install asar packaging tool
        if: steps.compare_versions.outputs.should_continue == 'true'
        shell: bash
        run: |
          set -e
          npm install -g @electron/asar || { echo "::error::Failed to install asar"; exit 1; }
      - name: Generate localization assets
        if: steps.compare_versions.outputs.should_continue == 'true'
        shell: bash
        run: |
          set -e
          temp_dir=$(mktemp -d -p ./)
          echo "TEMP_DIR=$temp_dir" >> "$GITHUB_ENV"
          echo "Generating assets..."
          get_platform_prefix() {
            case "$1" in
              "macos") echo "app-macos" ;;
              "windows") echo "app-windows" ;;
              "ubuntu") echo "app-linux" ;;
              *) echo "::error::Unsupported platform: $1" >&2; exit 1 ;;
            esac
          }
          get_feature() {
            case "$1" in
              "l") echo "localize" ;;
              "k") echo "skip" ;;
              "t") echo "trial" ;;
            esac
          }
          prefix=$(get_platform_prefix "${{ inputs.platform }}")
          RELEASE_LIST="${{ vars.RELEASE_LIST || 'l,lk,lt' }}"
          IFS=',' read -ra releases <<< "$RELEASE_LIST"
          for release in "${releases[@]}"; do
            args="" features=""
            for ((i=0; i<${#release}; i++)); do
              char="${release:$i:1}"
              feature=$(get_feature "$char")
              [ -n "$feature" ] && { args+="$char"; features+="${features:+'-'}$feature"; } || echo "::warning::Ignoring unknown argument: $char" >&2
            done
            file="${prefix}${args:+-$features}.asar"
            python lang.py -"$args" && cp "${{ inputs.source_path }}" "$temp_dir/$file" || exit 1
            echo "✓ $file"
          done
          ls -lah "$temp_dir"
      - name: Prepare release notes
        if: steps.compare_versions.outputs.should_continue == 'true'
        id: prepare_release_notes
        shell: bash
        run: |
          set -e
          echo "Preparing release notes..."
          [[ -f ./RELEASE_NOTES.md ]] || { echo "::error::RELEASE_NOTES.md not found"; exit 1; }
          updated_notes=$(sed "s/{{VERSION}}/v$TERMIUS_VERSION/g" ./RELEASE_NOTES.md)
          {
            echo "updated_release_notes<<EOF"
            echo "$updated_notes"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "✓ Release notes updated with v$TERMIUS_VERSION"
      - name: Publish release with generated assets
        if: steps.compare_versions.outputs.should_continue == 'true'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: v${{ env.TERMIUS_VERSION }}
          body: ${{ steps.prepare_release_notes.outputs.updated_release_notes }}
          draft: true
          prerelease: false
          artifacts: ${{ env.TEMP_DIR }}/*.asar
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cleanup temporary resources
        if: always()
        shell: bash
        run: |
          if [ -d "$TEMP_DIR" ]; then
            echo "Cleaning up temporary directory: $TEMP_DIR"
            rm -rf "$TEMP_DIR"
          fi